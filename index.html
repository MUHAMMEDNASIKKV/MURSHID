<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Murshid Selection Portal</title>
    <!-- Tailwind + Font Awesome + Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f8fafc; }
        .card-modern {
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.08);
            transition: all 0.2s;
        }
        .input-field {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 18px;
            transition: all 0.2s;
            background: #fff;
            font-size: 0.95rem;
        }
        .input-field:focus {
            outline: none;
            border-color: #0f3b2c;
            box-shadow: 0 0 0 3px rgba(15,59,44,0.1);
        }
        .input-field:disabled {
            background: #f1f5f9;
            cursor: not-allowed;
        }
        .teacher-card {
            border: 2px solid #e9ecef;
            border-radius: 24px;
            padding: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            background: #ffffff;
        }
        .teacher-card.selected {
            border-color: #0f3b2c;
            background: #f0f9f4;
            box-shadow: 0 8px 20px rgba(15,59,44,0.12);
        }
        .teacher-card.disabled-card {
            opacity: 0.5;
            cursor: not-allowed;
            background: #f8fafc;
        }
        .slot-badge {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            background: #f1f5f9;
            color: #1e293b;
        }
        .slot-full {
            background: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }
        .alert-popup {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #dc2626;
            color: white;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 600;
            box-shadow: 0 10px 25px -5px rgba(220,38,38,0.3);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            font-size: 0.9rem;
            white-space: nowrap;
        }
        .alert-popup.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .already-submitted-badge {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            border: 1px solid #f59e0b;
            color: #92400e;
            padding: 0.75rem 1rem;
            border-radius: 16px;
            font-weight: 500;
        }
        @media (max-width: 640px) {
            .alert-popup { white-space: normal; width: 90%; text-align: center; font-size: 0.85rem; }
        }
        .spinner-sm {
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Hide slot info display */
        #teacherSlotInfo {
            display: none;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <!-- MAIN PORTAL CARD -->
    <div class="max-w-3xl w-full card-modern p-5 md:p-8 transition-all">
        <div class="text-center mb-6">
            <h1 class="text-2xl md:text-3xl font-extrabold text-gray-800">Murshid Selection</h1>
            <div class="h-1 w-20 bg-emerald-700 mx-auto rounded-full mt-3"></div>
        </div>

        <!-- Student Info Form -->
        <div class="space-y-5">
            <!-- Enrol No -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1"><i class="fas fa-id-card mr-2 text-emerald-700"></i>Enrolment Number</label>
                <input type="text" id="enrolNo" class="input-field" placeholder="Enter your enrolment number" autocomplete="off">
                <p id="enrolError" class="text-xs text-red-500 mt-1 hidden"></p>
            </div>

            <!-- Name (auto) -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1"><i class="fas fa-user mr-2 text-emerald-700"></i>Full Name</label>
                <input type="text" id="studentName" class="input-field bg-gray-50" readonly placeholder="Will appear automatically">
            </div>

            <!-- Mode (auto) -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1"><i class="fas fa-graduation-cap mr-2 text-emerald-700"></i>Mode of Study</label>
                <input type="text" id="modeField" class="input-field bg-gray-50" readonly placeholder="Course / Thesis">
            </div>

            <!-- Already Submitted Status Message -->
            <div id="alreadySubmittedAlert" class="hidden already-submitted-badge flex items-center gap-3">
                <i class="fas fa-check-circle text-amber-600 text-xl"></i>
                <div>
                    <p class="font-semibold">✓ Already Submitted</p>
                    <p id="assignedMurshidText" class="text-sm mt-0.5"></p>
                </div>
            </div>

            <!-- Teacher selection dropdown (dynamic cards) -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2"><i class="fas fa-chalkboard-user mr-2 text-emerald-700"></i>Select Your Murshid (Teacher)</label>
                <div id="teacherContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-2">
                    <!-- Dynamic teacher cards injected -->
                </div>
                <div id="teacherSlotInfo" class="text-xs text-gray-500 mt-2 flex justify-between flex-wrap gap-2"></div>
            </div>

            <!-- Submit Button -->
            <button id="submitBtn" class="w-full bg-emerald-800 hover:bg-emerald-900 text-white font-bold py-3 rounded-2xl transition-all shadow-md flex items-center justify-center gap-2 text-lg mt-4">
                <i class="fas fa-check-circle"></i> Confirm & Submit
            </button>
        </div>

        <!-- Footer note -->
        <div class="mt-8 text-center text-xs text-gray-400 border-t pt-5">
            <i class="fas fa-clock mr-1"></i> Slots are allocated on first-come-first-serve basis. Each student can submit only once.
        </div>
    </div>

    <!-- global alert popup -->
    <div id="alertPopup" class="alert-popup">⚠️ Message</div>

    <script>
        // ======================== CONFIGURATION ========================
        // GOOGLE SHEETS CSV URL (public published CSV)
        const CSV_STUDENTS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRD_SWeZuq5uwY_5ezL78TD6Q4vjj-DX7d4STgQgxiPnUC-9UvK0VJ4MA008zSmHM08OiZmEVDh8Gw7/pub?gid=0&single=true&output=csv";
        
        // Google Apps Script Web App URL (for updating murshid column)
        // IMPORTANT: Replace with YOUR deployed Apps Script URL
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwmclBQnU8KYL9ls8DJwIo-NR29wps6TvnurIVMXHC3gqcabTOgm9WFy9r4RT02a8BK/exec";
        
        // SLOT LIMITS (based on mode)
        const SLOT_RULES = {
            "Thesis": {
                "AP MUSTHAFA HUDAWI": 6,
                "PK JAFAR HUDAWI": 4
            },
            "Course": {
                "AP MUSTHAFA HUDAWI": 21,
                "PK JAFAR HUDAWI": 6
            }
        };
        
        const TEACHERS = ["AP MUSTHAFA HUDAWI", "PK JAFAR HUDAWI"];
        
        // Global state
        let studentsData = [];
        let currentStudent = null;
        let selectedTeacher = null;
        let isAlreadySubmitted = false;
        
        // DOM elements
        const enrolInput = document.getElementById('enrolNo');
        const studentNameField = document.getElementById('studentName');
        const modeField = document.getElementById('modeField');
        const teacherContainer = document.getElementById('teacherContainer');
        const slotInfoDiv = document.getElementById('teacherSlotInfo');
        const submitBtn = document.getElementById('submitBtn');
        const alertPopup = document.getElementById('alertPopup');
        const enrolError = document.getElementById('enrolError');
        const alreadySubmittedAlert = document.getElementById('alreadySubmittedAlert');
        const assignedMurshidText = document.getElementById('assignedMurshidText');
        
        // ========== Helper: show alert popup ==========
        function showAlert(message, isError = true) {
            alertPopup.textContent = message;
            alertPopup.style.background = isError ? "#dc2626" : "#059669";
            alertPopup.classList.add('show');
            setTimeout(() => {
                alertPopup.classList.remove('show');
            }, 3000);
        }
        
        // ========== Fetch CSV and parse ==========
        async function fetchStudentsFromCSV() {
            try {
                const response = await fetch(CSV_STUDENTS_URL);
                const csvText = await response.text();
                const rows = csvText.split(/\r?\n/).filter(row => row.trim().length > 0);
                if (rows.length < 2) return [];
                const headers = rows[0].split(',').map(h => h.replace(/["']/g, '').trim().toLowerCase());
                const enrolIdx = headers.findIndex(h => h.includes('enrl') || h === 'enrol no' || h === 'enrol');
                const nameIdx = headers.findIndex(h => h === 'name');
                const modeIdx = headers.findIndex(h => h === 'mode');
                const murshidIdx = headers.findIndex(h => h === 'murshid');
                
                const students = [];
                for (let i = 1; i < rows.length; i++) {
                    const values = parseCSVRow(rows[i]);
                    if (values.length < 3) continue;
                    const enrolNo = values[enrolIdx] ? values[enrolIdx].trim() : '';
                    const name = values[nameIdx] ? values[nameIdx].trim() : '';
                    const mode = values[modeIdx] ? values[modeIdx].trim() : '';
                    const murshid = (murshidIdx !== -1 && values[murshidIdx]) ? values[murshidIdx].trim() : '';
                    if (enrolNo && name && mode) {
                        students.push({
                            enrol: enrolNo,
                            name: name,
                            mode: mode,
                            murshid: murshid || null
                        });
                    }
                }
                return students;
            } catch (err) {
                console.error("CSV fetch error:", err);
                showAlert("Failed to load student data. Please refresh.", true);
                return [];
            }
        }
        
        function parseCSVRow(rowStr) {
            const result = [];
            let inQuote = false;
            let current = '';
            for (let i = 0; i < rowStr.length; i++) {
                const ch = rowStr[i];
                if (ch === '"') {
                    inQuote = !inQuote;
                } else if (ch === ',' && !inQuote) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += ch;
                }
            }
            result.push(current.trim());
            return result;
        }
        
        // ========== Slot usage calculation ==========
        function getSlotUsage(mode) {
            const sameModeStudents = studentsData.filter(s => s.mode === mode && s.murshid && s.murshid.trim() !== '');
            const usage = {
                "AP MUSTHAFA HUDAWI": 0,
                "PK JAFAR HUDAWI": 0
            };
            sameModeStudents.forEach(s => {
                const teacher = s.murshid.trim();
                if (teacher === "AP MUSTHAFA HUDAWI") usage["AP MUSTHAFA HUDAWI"]++;
                else if (teacher === "PK JAFAR HUDAWI") usage["PK JAFAR HUDAWI"]++;
            });
            return usage;
        }
        
        function isSlotAvailable(teacher, mode) {
            const usage = getSlotUsage(mode);
            const limit = SLOT_RULES[mode]?.[teacher] || 0;
            const current = usage[teacher] || 0;
            return current < limit;
        }
        
        // ========== Render teacher cards (NO SLOT INFO DISPLAY) ==========
        function renderTeacherCards(mode, forceDisabled = false) {
            if (!mode) {
                teacherContainer.innerHTML = `<div class="col-span-2 text-center text-gray-400 py-8">
                    <i class="fas fa-search text-3xl mb-2"></i>
                    <p>Enter your enrolment number to see teacher options</p>
                </div>`;
                slotInfoDiv.innerHTML = '';
                return;
            }
            
            const usage = getSlotUsage(mode);
            let cardsHtml = '';
            
            TEACHERS.forEach(teacher => {
                const limit = SLOT_RULES[mode]?.[teacher] || 0;
                const current = usage[teacher] || 0;
                const available = current < limit;
                const remaining = limit - current;
                const isSelected = (selectedTeacher === teacher);
                
                let disabledClass = '';
                let clickHandler = '';
                
                if (forceDisabled || isAlreadySubmitted) {
                    disabledClass = 'disabled-card opacity-50 cursor-not-allowed border-gray-200 bg-gray-50';
                    clickHandler = '';
                } else if (!available) {
                    disabledClass = 'disabled-card opacity-50 cursor-not-allowed border-gray-200 bg-gray-50';
                    clickHandler = '';
                } else {
                    disabledClass = 'cursor-pointer hover:shadow-md transition-all';
                    clickHandler = `onclick="selectTeacher('${teacher}')"`;
                }
                
                const selectedClass = (isSelected && !forceDisabled && !isAlreadySubmitted) ? 'selected border-emerald-700 bg-emerald-50' : '';
                
                let badgeText = '';
                let badgeClass = '';
                if (forceDisabled || isAlreadySubmitted) {
                    badgeText = 'Locked';
                    badgeClass = 'bg-gray-300 text-gray-600';
                } else if (!available) {
                    badgeText = 'Full';
                    badgeClass = 'bg-red-100 text-red-700';
                } else {
                    badgeText = `${remaining} slot${remaining !== 1 ? 's' : ''} left`;
                    badgeClass = 'bg-emerald-100 text-emerald-700';
                }
                
                cardsHtml += `
                    <div class="teacher-card border-2 rounded-xl p-4 ${disabledClass} ${selectedClass}" ${clickHandler} data-teacher="${teacher}">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-bold text-gray-800 text-lg">${teacher}</h3>
                                <p class="text-xs text-gray-500 mt-1">Murshid</p>
                            </div>
                            <div class="text-xs font-semibold px-3 py-1 rounded-full ${badgeClass}">
                                ${badgeText}
                            </div>
                        </div>
                        <div class="mt-2 text-xs text-gray-500">
                            ${!forceDisabled && !isAlreadySubmitted ? (available ? `Available: ${remaining} / ${limit}` : `No seats left for ${mode} mode`) : 'Selection already completed'}
                        </div>
                    </div>
                `;
            });
            
            teacherContainer.innerHTML = cardsHtml;
            
            // Clear slot info div (no display)
            slotInfoDiv.innerHTML = '';
        }
        
        // Global function for teacher selection
        window.selectTeacher = function(teacher) {
            if (!currentStudent) {
                showAlert("Please enter a valid enrolment number first");
                return;
            }
            
            if (isAlreadySubmitted) {
                showAlert(`You have already submitted your selection. Your Murshid is: ${currentStudent.murshid}`);
                return;
            }
            
            if (currentStudent.murshid && currentStudent.murshid.trim() !== "") {
                showAlert(`You have already selected ${currentStudent.murshid}. Selection cannot be changed.`);
                return;
            }
            
            if (!isSlotAvailable(teacher, currentStudent.mode)) {
                showAlert(`No available slots for ${teacher} in ${currentStudent.mode} mode. Slots are full.`);
                renderTeacherCards(currentStudent.mode, false);
                return;
            }
            
            selectedTeacher = teacher;
            renderTeacherCards(currentStudent.mode, false);
            showAlert(`Selected: ${teacher}`, false);
        };
        
        // ========== Student lookup with submission check ==========
        async function lookupStudent(enrol) {
            if (!enrol || enrol.trim() === "") {
                resetStudentUI();
                return false;
            }
            
            await refreshStudentData();
            
            const found = studentsData.find(s => s.enrol === enrol.trim());
            if (!found) {
                enrolError.textContent = "❌ Enrolment number not found in registry";
                enrolError.classList.remove("hidden");
                resetStudentUI();
                currentStudent = null;
                selectedTeacher = null;
                isAlreadySubmitted = false;
                renderTeacherCards(null);
                return false;
            }
            
            enrolError.classList.add("hidden");
            currentStudent = { ...found };
            studentNameField.value = currentStudent.name;
            modeField.value = currentStudent.mode;
            
            // Check if already submitted
            if (currentStudent.murshid && currentStudent.murshid.trim() !== "") {
                isAlreadySubmitted = true;
                selectedTeacher = currentStudent.murshid;
                
                alreadySubmittedAlert.classList.remove("hidden");
                assignedMurshidText.innerHTML = `<strong>Murshid:</strong> ${currentStudent.murshid}`;
                
                renderTeacherCards(currentStudent.mode, true);
                submitBtn.disabled = true;
                submitBtn.style.opacity = "0.6";
                submitBtn.style.cursor = "not-allowed";
                submitBtn.innerHTML = '<i class="fas fa-lock"></i> Already Submitted';
                
                showAlert(`ℹ️ You have already submitted. Your Murshid is: ${currentStudent.murshid}`, false);
            } else {
                isAlreadySubmitted = false;
                alreadySubmittedAlert.classList.add("hidden");
                selectedTeacher = null;
                renderTeacherCards(currentStudent.mode, false);
                submitBtn.disabled = false;
                submitBtn.style.opacity = "1";
                submitBtn.style.cursor = "pointer";
                submitBtn.innerHTML = '<i class="fas fa-check-circle"></i> Confirm & Submit';
            }
            
            return true;
        }
        
        function resetStudentUI() {
            studentNameField.value = '';
            modeField.value = '';
            currentStudent = null;
            selectedTeacher = null;
            isAlreadySubmitted = false;
            alreadySubmittedAlert.classList.add("hidden");
            renderTeacherCards(null);
            submitBtn.disabled = false;
            submitBtn.style.opacity = "1";
            submitBtn.style.cursor = "pointer";
            submitBtn.innerHTML = '<i class="fas fa-check-circle"></i> Confirm & Submit';
            enrolError.classList.add("hidden");
        }
        
        async function refreshStudentData() {
            try {
                const data = await fetchStudentsFromCSV();
                if (data.length) studentsData = data;
                else console.warn("No data from CSV");
            } catch(e) { console.error(e); }
        }
        
        // ========== Submit selection ==========
        async function submitSelection() {
            if (!currentStudent) {
                showAlert("❌ Please enter a valid enrolment number first.");
                return;
            }
            
            if (isAlreadySubmitted) {
                showAlert(`❌ You have already submitted. Your Murshid is: ${currentStudent.murshid}`);
                return;
            }
            
            if (currentStudent.murshid && currentStudent.murshid.trim() !== "") {
                showAlert(`⚠️ You already selected ${currentStudent.murshid}. Selection cannot be changed.`);
                return;
            }
            
            if (!selectedTeacher) {
                showAlert("⚠️ Please select a teacher (Murshid) before submitting.");
                return;
            }
            
            const mode = currentStudent.mode;
            const available = isSlotAvailable(selectedTeacher, mode);
            if (!available) {
                showAlert(`❌ No available slots for ${selectedTeacher} in ${mode} mode. Slots are full.`);
                renderTeacherCards(mode, false);
                return;
            }
            
            const originalBtnHtml = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting...';
            
            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: new URLSearchParams({
                        action: "updateMurshid",
                        enrolNo: currentStudent.enrol,
                        murshid: selectedTeacher,
                        mode: currentStudent.mode
                    })
                });
                
                console.log("Submission sent. Updating local state...");
                
                const studentIndex = studentsData.findIndex(s => s.enrol === currentStudent.enrol);
                if (studentIndex !== -1) {
                    studentsData[studentIndex].murshid = selectedTeacher;
                    currentStudent.murshid = selectedTeacher;
                }
                
                setTimeout(async () => {
                    await refreshStudentData();
                    if (currentStudent) {
                        const updated = studentsData.find(s => s.enrol === currentStudent.enrol);
                        if (updated) currentStudent.murshid = updated.murshid;
                        isAlreadySubmitted = true;
                        alreadySubmittedAlert.classList.remove("hidden");
                        assignedMurshidText.innerHTML = `<strong>Murshid:</strong> ${selectedTeacher}`;
                        renderTeacherCards(currentStudent.mode, true);
                        submitBtn.disabled = true;
                        submitBtn.innerHTML = '<i class="fas fa-check-double"></i> Submitted Successfully';
                    }
                    showAlert(`✅ Success! You have selected ${selectedTeacher} as your Murshid.`, false);
                }, 1000);
                
                showAlert(`🎉 Selection submitted! Teacher: ${selectedTeacher}`, false);
                selectedTeacher = null;
                
            } catch (err) {
                console.error("Submit error:", err);
                showAlert("Network error: Could not update. Please try again later.");
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnHtml;
            }
        }
        
        // ========== Event listeners ==========
        let debounceTimeout;
        enrolInput.addEventListener('input', (e) => {
            clearTimeout(debounceTimeout);
            const val = e.target.value.trim();
            debounceTimeout = setTimeout(async () => {
                if (val.length > 0) {
                    await lookupStudent(val);
                } else {
                    resetStudentUI();
                }
            }, 400);
        });
        
        submitBtn.addEventListener('click', submitSelection);
        
        // Initial data load
        (async function init() {
            await refreshStudentData();
            resetStudentUI();
        })();
        
        if (APPS_SCRIPT_URL.includes("REPLACE-WITH-YOUR-SCRIPT-ID")) {
            console.warn("⚠️ Please replace APPS_SCRIPT_URL with your actual Google Apps Script Web App URL.");
        }
    </script>
</body>
</html>
